---
- name: Update Proxmox nodes
  hosts: proxmox
  become: true
  gather_facts: false
  serial: 1
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 60

    - name: Gather upgradable packages
      ansible.builtin.shell: apt list --upgradable | sed '/Listing.../d'
      register: apt_list_upgradable_result
      changed_when: false

    - name: Display upgradable packages
      ansible.builtin.debug:
        var: apt_list_upgradable_result.stdout_lines

    - name: Install apt upgrades
      ansible.builtin.apt:
        upgrade: full
        autoremove: true
        autoclean: true
        lock_timeout: 60

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Show if reboot is required
      ansible.builtin.debug:
        msg: "Reboot is required! Node will be restarted."
      when: reboot_required_file.stat.exists

    - name: Verify cluster quorum before reboot
      ansible.builtin.command: pvecm status
      register: quorum_check_before
      changed_when: false
      when: reboot_required_file.stat.exists and inventory_hostname in groups['pve_cluster']

    - name: Abort if cluster is not quorate
      ansible.builtin.assert:
        that: quorum_check_before.stdout is search('Quorate:\\s*Yes')
        fail_msg: "Cluster is not quorate, refusing to reboot {{ inventory_hostname }}"
      when: reboot_required_file.stat.exists and inventory_hostname in groups['pve_cluster']

    - name: Enable HA maintenance mode
      ansible.builtin.command: "ha-manager crm-command node-maintenance enable {{ inventory_hostname }}"
      when: reboot_required_file.stat.exists and inventory_hostname in groups['pve_cluster']

    - name: Reboot if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible after upgrades."
        reboot_timeout: 900
      when: reboot_required_file.stat.exists

    - name: Wait for node to become reachable after reboot
      ansible.builtin.wait_for_connection:
        timeout: 600
      when: reboot_required_file.stat.exists

    - name: Disable HA maintenance mode
      ansible.builtin.command: "ha-manager crm-command node-maintenance disable {{ inventory_hostname }}"
      when: reboot_required_file.stat.exists and inventory_hostname in groups['pve_cluster']

    - name: Verify cluster quorum after reboot
      ansible.builtin.command: pvecm status
      register: quorum_check_after
      until: quorum_check_after.stdout is search('Quorate:\\s*Yes')
      retries: 12
      delay: 10
      changed_when: false
      when: reboot_required_file.stat.exists and inventory_hostname in groups['pve_cluster']

    - name: Wait for Ceph cluster health to be OK or WARN
      ansible.builtin.shell: ceph health
      register: ceph_health_result
      until: ceph_health_result.stdout is search('HEALTH_OK') or ceph_health_result.stdout is search('HEALTH_WARN')
      retries: 30
      delay: 10
      changed_when: false
      when: reboot_required_file.stat.exists and inventory_hostname in groups['pve_cluster']
